<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNEGABLE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:#0a0a0a;color:white;}

/* --- HEADER --- */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:2% 3%;
    background:#0a0a0a;
    position:sticky;
    top:0;
    z-index:20;
    border-bottom:1px solid #222;
}
.logo{font-weight:900;font-size:18px;letter-spacing:3px;white-space: nowrap;}
.menu-btn{font-size:22px;cursor:pointer;}
.cart{font-size:20px;cursor:pointer;position:relative;}
.cart-count{
    position:absolute;
    top:-6px;
    right:-8px;
    background:#ffd000;
    color:black;
    border-radius:50%;
    padding:2px 5px;
    font-size:9px;
    display:none;
}

/* --- SIDEBAR --- */
#sidebar{
    position:fixed;
    left:-280px;
    top:0;
    width:280px;
    height:100%;
    background:#111;
    padding-top:70px;
    transition:.5s;
    z-index:100;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}
#sidebar.open{left:0;}
#sidebar a{
    display:block;
    padding:15px 30px;
    color:#aaa;
    text-decoration:none;
    transition:.2s;
    font-size: 15px;
}
#sidebar a:hover{background:#1a1a1a;color:white;}
.close-btn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    cursor:pointer;
    color:white;
}

/* --- OVERLAY --- */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:90;
}
#overlay.show{display:block;}

/* --- HERO --- */
.hero{
    min-height:20vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    padding:2% 3%;
}
.hero-text{
    position:relative;
    z-index:2;
    width:100%;
    max-width: 600px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}
.hero h1{font-size:32px;letter-spacing:4px;line-height: 1.1;margin-bottom: 1%;}
.hero p{color:#aaa;font-size:13px;margin-bottom:1%;}
.hero-line{position:absolute;top:12vh;left:0;width:100%;height:1px;background:#222;z-index:1;}

/* --- CONTAINER --- */
.container{padding:0 3% 5vh 3%; position:relative;}

/* --- BUSCADOR --- */
.search-bar{
    position:relative;
    margin-bottom:15px;
    text-align:center;
}
.search-bar input{
    padding:8px 35px 8px 12px;
    width:90%;
    max-width:400px;
    border-radius:8px;
    border:1px solid #333;
    background:#111;
    color:white;
    outline:none;
    transition:.3s;
}
.search-bar input:hover, .search-bar input:focus{
    border-color:#ffd000;
    box-shadow:0 0 10px #ffd00033;
}
.search-bar .clear-btn {
    position: absolute;
    right: 9%;
    top: 50%;          
    transform: translateY(-50%);
    cursor: pointer;
    font-weight: bold;
    color: #ffd000;
    display: none;
    z-index: 2;
}
/* --- RESULTADOS --- */
.search-results{
    position:absolute;
    top:45px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:#111;
    border:1px solid #333;
    border-radius:8px;
    max-height:200px;
    overflow-y:auto;
    z-index:10;
    display:none;
}
.search-results .result{
    display:flex;
    align-items:center;
    padding:5px 10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    transition:.2s;
}
.search-results .result:hover{
    background:#222;
    color:#ffd000;
}
.search-results img{
    width:30px;
    height:30px;
    object-fit:contain;
    margin-right:10px;
}

/* --- CATEGORIES --- */
.categories{
    display:flex;
    gap:4px;
    margin-top:1%;
    margin-bottom:3%;
    justify-content:center;
    flex-wrap:nowrap; 
    overflow-x:auto;
    padding-bottom:5px;
}
.categories button{
    flex:0 0 auto;
    background:#111;
    border:1px solid #333;
    color:white;
    padding:3px 6px; 
    cursor:pointer;
    border-radius:6px;
    transition:.3s;
    font-size:11px;
    white-space: nowrap;
}
.categories button:hover, .categories button.active{
    border-color:#ffd000;
    box-shadow:0 0 10px #ffd00033;
    background:#111;
    color:#ffd000;
}

/* --- PRODUCTOS --- */
.products{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap:10px;
    justify-items:center;
    padding-bottom:5vh;
}
.product{
    width: 100px;
    margin-right: 15px;
    border:2px solid #ffd000;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition: transform .3s, box-shadow .3s, border-color .3s;
    cursor:pointer;
}
.product:hover{
    transform:scale(1.03);
    box-shadow:0 10px 25px rgba(255,208,0,0.3);
    border-color:#ffd000;
}
.product img{
    width:100%;
    height:auto;
    object-fit:contain;
}
.info{
    text-align:center;
    padding:8px;
}
.info h3{
    font-family:'Playfair Display', serif;
    font-size:16px;
    font-weight:700;
    margin:6px 0;
    color:white;
}
.info .price{
    font-family:'Montserrat', sans-serif;
    font-size:14px;
    font-weight:700;
    color:#ffd000;
}

/* --- CART PANEL --- */
#cartPanel{
    position:fixed;
    right:-100%;
    top:0;
    width:380px;
    max-width: 95%;
    height:100%;
    background:#111;
    border-left:1px solid #222;
    padding:3%;
    transition:.4s;
    z-index:300;
    overflow-y:auto;
    box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}
#cartPanel.open{right:0;}
.cart-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:3%;
    border-bottom: 1px solid #222;
    padding-bottom: 2%;
}
.close-cart{font-size:22px;cursor:pointer;}

/* --- CART ITEMS --- */
.cart-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:#1a1a1a;padding:8px;border-radius:8px;}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.cart-item-info{flex:1;display:flex;flex-direction:column;}
.cart-item-info span{font-size:14px;}
.cart-item-controls{display:flex;align-items:center;gap:5px;}
.cart-item-controls button{width:28px;height:28px;background:#222;color:white;border:none;font-size:14px;border-radius:6px;cursor:pointer;transition:.2s;}
.cart-item-controls button:hover{background:#ffd000;color:black;}
.cart-item-controls input{width:40px;text-align:center;background:#111;border:1px solid #333;color:white;border-radius:6px;padding:4px;}
.cart-item-controls .remove{font-size:12px;padding:0 6px;}

/* --- MENSAJE SIN PRODUCTOS --- */
.no-products{
    text-align:center;
    color:#aaa;
    margin-top:10px;
    font-size:13px;
}

/* --- FLY IMAGE --- */
.fly-img{position:absolute;width:60px;height:60px;border-radius:6px;pointer-events:none;z-index:500;transition:all .5s ease-out;}

@media(max-width:500px){
    .products{grid-template-columns:1fr;}
    .product{width: 100%; max-width: 160px;}
    .info h3{font-size:18px;}
    .info .price{font-size:16px;}
}
</style>
</head>
<body>

<header>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">INNEGABLE</div>

    <div class="cart" onclick="toggleCart()">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.6 13.4a2 2 0 0 0 2 1.6h7.4a2 2 0 0 0 2-1.6L23 6H6"></path>
        </svg>

        <span id="cart-count" class="cart-count">0</span>

    </div>
</header>

<div id="sidebar">
    <div class="close-btn" onclick="toggleMenu()">✕</div>
    <a href="#">Iniciar sesión</a>
    <a href="#">Sobre nosotros</a>
    <a href="#">Medidas</a>
    <a href="#">Cuidados de nuestros productos</a>
</div>
<div id="overlay" onclick="closeCart()"></div>

<div class="hero">
    <div class="hero-text">
        <h1>INNEGABLE</h1>
        <p>Streetwear que no se discute</p>
        <div class="hero-line"></div>
    </div>
</div>

<div class="container">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar producto...">
        <span class="clear-btn" id="clearBtn">✕</span>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="categories">
        <button onclick="filterProducts('all')" id="btnAll" class="active">Todo</button>
        <button onclick="filterProducts('semi')" id="btnSemi">Semi Oversize</button>
        <button onclick="filterProducts('comp')" id="btnComp">Compresión</button>
    </div>

    <div class="products">
        <div class="product" data-category="semi" data-name="★ Batman semi oversize" data-price="550" data-img="batman1.png">
            <img src="batman1.png" alt="Playera Oversize">
            <div class="info">
                <h3>★ Batman semi oversize</h3>
                <p class="price">$550</p>
            </div>
        </div>
    </div>
    <div class="no-products" id="noProducts" style="display:none;">Estos productos todavía no se encuentran disponibles.</div>
</div>

<div id="cartPanel">
    <div class="cart-header">
        <h2>Carrito</h2>
        <div class="close-cart" onclick="closeCart()">✕</div>
    </div>
    <div id="cartItems"></div>
    <h3 id="total">Total: $0</h3>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Menú y carrito
function toggleMenu(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("show");}
function toggleCart(){document.getElementById("cartPanel").classList.toggle("open");document.getElementById("overlay").classList.toggle("show");}
function closeCart(){document.getElementById("cartPanel").classList.remove("open");document.getElementById("overlay").classList.remove("show");document.getElementById("sidebar").classList.remove("open");}

// Contador y render del carrito
function updateCartCount(){
    let count = cart.reduce((a,b)=>a+(b.qty||1),0);
    const c = document.getElementById("cart-count");
    if(count>0){c.style.display="block";c.innerText=count;}else{c.style.display="none";}
}
function renderCartItems(){
    const container=document.getElementById("cartItems");
    container.innerHTML="";
    if(cart.length===0){
        container.innerHTML='<div class="no-products">Tu carrito está vacío.</div>';
        document.getElementById("total").innerText="Total: $0";
        return;
    }
    let total=0;
    cart.forEach((p,i)=>{
        let div=document.createElement("div"); 
        div.className="cart-item";
        div.innerHTML=`
        <img src="${p.img || p.images?.[0]}">
        <div class="cart-item-info"><span>${p.name}</span><span class="cart-price">$${p.price}</span></div>
        <div class="cart-item-controls">
            <button onclick="changeQty(${i},-1)">-</button>
            <input type="text" value="${p.qty}" readonly>
            <button onclick="changeQty(${i},1)">+</button>
            <button class="remove" onclick="removeItem(${i})">✕</button>
        </div>`;
        container.appendChild(div);
        total += p.price * p.qty;
    });
    document.getElementById("total").innerText="Total: $"+total;
    localStorage.setItem("cart",JSON.stringify(cart));
}

// Cantidad y eliminación
function changeQty(i,a){cart[i].qty=Math.max(1,cart[i].qty+a);renderCartItems();updateCartCount();}
function removeItem(i){cart.splice(i,1);renderCartItems();updateCartCount();}

// Fly to cart
function flyToCart(img){
    const flyImg=document.createElement("img");
    flyImg.src=img.src;
    flyImg.className="fly-img";
    document.body.appendChild(flyImg);
    const rect=img.getBoundingClientRect();
    flyImg.style.left=rect.left+"px";
    flyImg.style.top=rect.top+"px";
    const cartIcon=document.querySelector(".cart");
    const cartRect=cartIcon.getBoundingClientRect();
    requestAnimationFrame(()=>{
        flyImg.style.left=cartRect.left+"px";
        flyImg.style.top=cartRect.top+"px";
        flyImg.style.width="20px";
        flyImg.style.height="20px";
        flyImg.style.opacity="0.5";
    });
    setTimeout(()=>{document.body.removeChild(flyImg);},500);
}

// *** NUEVA FUNCIÓN: Ir a página del producto ***
function goToProduct(productElement) {
    const name = productElement.dataset.name;
    const price = productElement.dataset.price;
    const img = productElement.dataset.img;
    
    const url = `producto.html?name=${encodeURIComponent(name)}&price=${price}&img0=${encodeURIComponent(img)}`;
    window.location.href = url;
}

// Agregar al carrito
function addToCart(product,img){
    const existing = cart.find(p=>p.name===product.name);
    if(existing){existing.qty+=1;}
    else{cart.push({...product, qty:1});}
    localStorage.setItem("cart",JSON.stringify(cart));
    flyToCart(img);
    updateCartCount();
    renderCartItems();
}

// Filtros
function filterProducts(category){
    const products = document.querySelectorAll('.product');
    let anyVisible=false;
    products.forEach(p=>{
        if(category==='all'||p.dataset.category===category){p.style.display='block'; anyVisible=true;}
        else{p.style.display='none';}
    });
    document.getElementById('noProducts').style.display = anyVisible ? 'none':'block';
    document.querySelectorAll('.categories button').forEach(b=>b.classList.remove('active'));
    const btn=document.getElementById('btn'+category.charAt(0).toUpperCase()+category.slice(1));
    if(btn) btn.classList.add('active');
}

// Búsqueda
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
const clearBtn=document.getElementById('clearBtn');

searchInput.addEventListener('input', function(){
    const query=this.value.toLowerCase();
    searchResults.innerHTML='';
    if(query.trim()===''){searchResults.style.display='none';clearBtn.style.display='none';return;}
    clearBtn.style.display='block';
    const products=document.querySelectorAll('.product');
    let count=0;
    products.forEach(p=>{
        const name=p.querySelector('h3').innerText.toLowerCase();
        if(name.includes(query)){
            const imgSrc=p.querySelector('img').src;
            const div=document.createElement('div');
            div.className='result';
            div.innerHTML=`<img src="${imgSrc}"><span>${p.querySelector('h3').innerText}</span>`;
            div.addEventListener('click', ()=>{goToProduct(p);});
            searchResults.appendChild(div);
            count++;
        }
    });
    searchResults.style.display=count>0?'block':'none';
});
clearBtn.addEventListener('click', ()=>{
    searchInput.value='';
    searchResults.style.display='none';
    clearBtn.style.display='none';
});

// *** EVENTOS CORREGIDOS PARA PRODUCTOS ***
document.querySelectorAll('.product').forEach(product => {
    // Click en imagen o nombre -> Ir a página del producto
    const img = product.querySelector('img');
    const info = product.querySelector('.info');
    
    img.addEventListener('click', (e) => {
        e.stopPropagation();
        goToProduct(product);
    });
    
    info.addEventListener('click', (e) => {
        e.stopPropagation();
        goToProduct(product);
    });
    
      // Click derecho o Ctrl+Click -> Agregar al carrito directamente
    product.addEventListener('click', (e) => {
        if (e.button === 2 || (e.ctrlKey && e.button === 0)) {            e.preventDefault();
            const productData = {
                name: product.dataset.name, 
                price: parseInt(product.dataset.price), 
                img: product.dataset.img
            };
            const imgElement = product.querySelector('img');
            addToCart(productData, imgElement);
        }
    });
    
    // Prevenir menú contextual en productos
    product.addEventListener('contextmenu', (e) => {
        e.preventDefault();
    });
});

updateCartCount();
renderCartItems();
</script>
</body>
</html>
