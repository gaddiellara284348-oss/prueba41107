<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido | INNEGABLE</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #050505; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-weight: 900; letter-spacing: 4px; text-align: center; font-size: 22px; margin-bottom: 25px; text-transform: uppercase; }
        .order-summary { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        .item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #aaa; }
        .total { display: flex; justify-content: space-between; font-weight: 900; color: #ffd000; font-size: 20px; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; font-family: inherit; font-size: 14px; }
        .grid-direccion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px dashed #333; }
        .full-width { grid-column: span 2; }
        .info-caja { font-size: 11px; color: #ffd000; background: rgba(255,208,0,0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,208,0,0.2); text-align: center; margin-top: 5px; }
        .btn-confirmar { background: #fff; color: #000; border: none; padding: 20px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px; }
        #seccion-nacional, #datos-transferencia { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>FINALIZAR PEDIDO</h1>
    <div class="order-summary">
        <div id="lista-items"></div>
        <div class="total"><span>TOTAL:</span><span id="total-final">$0</span></div>
    </div>

    <form id="form-pago">
        <div class="form-group"><label>Nombre</label><input type="text" id="nombre" required></div>
        <div class="form-group"><label>Instagram</label><input type="text" id="instagram" placeholder="@tu_usuario" required></div>
        <div class="form-group">
            <label>Entrega</label>
            <select id="entrega" onchange="gestionarEntrega()">
                <option value="Plaza Tutuli">Local: Plaza Tutuli</option>
                <option value="ITSON Nainari">Local: ITSON Nainari</option>
                <option value="Envío Nacional">Envío Nacional (+$150)</option>
            </select>
        </div>
        <div id="info-local" class="info-caja">📍 Entrega presencial antes de las 6:00 PM.</div>
        <div id="seccion-nacional">
            <div class="grid-direccion">
                <input type="text" id="calle" class="full-width" placeholder="Calle y Número">
                <input type="text" id="colonia" placeholder="Colonia">
                <input type="text" id="cp" placeholder="C.P.">
                <input type="text" id="ciudad" placeholder="Ciudad">
                <input type="text" id="estado" placeholder="Estado">
            </div>
        </div>
        <div class="form-group">
            <label>Método de Pago</label>
            <select id="metodo-pago" onchange="gestionarPago()">
                <option value="Mercado Pago">Mercado Pago (Tarjeta)</option>
                <option value="Transferencia">Transferencia Bancaria</option>
            </select>
        </div>
        <div id="datos-transferencia" class="info-caja" style="text-align: left; color: white;">
            <b>Banco:</b> NU BANCO<br><b>CLABE:</b> 123 456 789 012 345 678<br><b>Nombre:</b> Gaddiel Alfonso
        </div>
        <button type="submit" class="btn-confirmar">Confirmar y Pagar</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Tu Config de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyALveZhJoZ7fEfDHP9GksFG1miNNP6YSj8",
        authDomain: "innegable-8f2ce.firebaseapp.com",
        projectId: "innegable-8f2ce",
        storageBucket: "innegable-8f2ce.firebasestorage.app",
        messagingSenderId: "217642763545",
        appId: "1:217642763545:web:11f8e251f83c51f27a3188"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // 2. Inicializamos Mercado Pago con TU LLAVE
    const mp = new MercadoPago('APP_USR-88094952-da88-4415-964f-e7479378cecc');

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);

    window.gestionarEntrega = () => {
        const entrega = document.getElementById("entrega").value;
        document.getElementById("seccion-nacional").style.display = (entrega === "Envío Nacional") ? "block" : "none";
        document.getElementById("info-local").style.display = (entrega === "Envío Nacional") ? "none" : "block";
        document.getElementById("total-final").innerText = "$" + (subtotal + (entrega === "Envío Nacional" ? 150 : 0));
    };

    window.gestionarPago = () => {
        const metodo = document.getElementById("metodo-pago").value;
        document.getElementById("datos-transferencia").style.display = (metodo === "Transferencia") ? "block" : "none";
    };

    document.getElementById("form-pago").onsubmit = async (e) => {
        e.preventDefault();
        const entrega = document.getElementById("entrega").value;
        const metodo = document.getElementById("metodo-pago").value;
        
        const pedido = {
            cliente: document.getElementById("nombre").value,
            instagram: document.getElementById("instagram").value,
            total_final: subtotal + (entrega === "Envío Nacional" ? 150 : 0),
            metodo_pago: metodo,
            items: cart,
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "pedidos"), pedido);
            localStorage.removeItem("cart");

            if(metodo === "Mercado Pago") {
                // ABRE EL PAGO EN LA MISMA PÁGINA
                window.location.href = "https://link.mercadopago.com.mx/innegable";
            } else {
                alert("¡Pedido registrado! Mándanos tu comprobante.");
                window.location.href = "https://www.instagram.com/gaddiel411/";
            }
        } catch (err) { alert("Error al guardar pedido"); }
    };

    document.getElementById("total-final").innerText = "$" + subtotal;
    document.getElementById("lista-items").innerHTML = cart.map(i => `<div class="item"><span>${i.qty}x ${i.name}</span><span>$${i.price*i.qty}</span></div>`).join('');
</script>
</body>
</html>
