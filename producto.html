<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto | INNEGABLE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #222;
position:sticky;
top:0;
background:#0a0a0a;
z-index:50;
}

.back-btn{
font-size:24px;
cursor:pointer;
padding:8px;
border-radius:6px;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
width:40px;
height:40px;
}

.back-btn svg {
    transition: all .2s ease;
}

.back-btn:hover{
background:#111;
}

.back-btn:hover svg {
    stroke: #ffd000;
    filter: drop-shadow(0 0 4px rgba(255,208,0,.5));
}

.logo{
font-weight:900;
letter-spacing:8px;
font-size:18px;
}

.cart{
font-size:22px;
cursor:pointer;
position:relative;
padding:8px;
border-radius:6px;
transition:.2s;
}

.cart:hover{
background:#111;
}

.cart-count{
position:absolute;
top:-6px;
right:-8px;
background:#ffd000;
color:black;
border-radius:50%;
padding:2px 5px;
font-size:9px;
display:none;
}

/* OVERLAY */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
z-index:90;
}
#overlay.show{display:block;}

.container{
padding:40px 10%;
}

.product-view{
display:flex;
flex-wrap:wrap;
gap:30px;
}

.product-left{
flex: 0 0 600px; /* Ancho fijo máximo para laptops */
max-width: 600px;
position:relative;
overflow:hidden;
touch-action:pan-y;
}

.product-left img{
width:100%;
max-width: 600px;
height: auto;
max-height: 500px;
object-fit: contain; /* Mantiene proporciones SIN recortar */
border-radius:8px;
transition:transform .35s ease,opacity .35s ease;
}

/* LAPTOPS - MÁS ESPECÍFICO */
@media (min-width: 1024px) and (max-width: 1400px) {
.container {
    padding: 40px 3%;
    max-width: 1200px;
    margin: 0 auto;
}
.product-view {
    max-width: 1100px;
}
.product-left {
    flex: 0 0 500px !important; /* ¡Fijo! 500px máximo */
    max-width: 500px !important;
}
.product-left img {
    max-width: 500px !important;
    max-height: 450px !important;
    width: 100% !important;
}
.product-right {
    flex: 1;
    min-width: 300px;
}
}

/* ESCRITORIO GRANDE */
@media (min-width: 1401px) {
.product-left {
    flex: 0 0 700px;
    max-width: 700px;
}
.product-left img {
    max-width: 700px;
    max-height: 600px;
}
}

/* MÓVILES - SIN CAMBIOS */
@media(max-width:768px){
.product-left {
    flex: none;
    width: 100%;
    max-width: none;
}
.product-left img{
width:100%;
max-width: 100vw; /* Línea NUEVA: nunca excede pantalla */
height: auto;
border-radius:8px;
transition:transform .35s ease,opacity .35s ease;
object-fit: contain; /* Línea NUEVA: MUESTRA COMPLETA */
}
}
.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.6);
padding:12px;
font-size:36px;
color:white;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

.product-thumbs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.product-thumbs img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  background: #111;
  border: 2px solid #333;
  border-radius: 6px;
  cursor: pointer;
}

.product-thumbs img:hover{
border-color:#ffd000;
}

.product-thumbs img.active{
border-color:#ffd000;
}

.product-right{
flex:1;
min-width:280px;
display:flex;
flex-direction:column;
gap:10px;
}

.description{
color:#aaa;
font-size:14px;
}

.size-options{
display:flex;
gap:8px;
margin-bottom:10px;
}

.size-options button{
padding:8px 12px;
background:#1a1a1a;
border:1px solid #333;
color:white;
cursor:pointer;
border-radius:6px;
transition:.2s;
font-weight:500;
}

.size-options button:hover{
border-color:#ffd000;
}

.size-options button.active{
background:#ffd000;
color:black;
}

.size-options.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.qty-selector{
display:flex;
gap:8px;
align-items:center;
}

.qty-selector button{
width:32px;
height:32px;
background:#222;
color:white;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.qty-selector button:hover{
background:#ffd000;
color:black;
}

.qty-selector input{
width:50px;
text-align:center;
background:#111;
border:1px solid #333;
color:white;
border-radius:6px;
padding:4px;
}

.add-cart{
background:#ffd000;
color:black;
padding:16px;
border-radius:8px;
cursor:pointer;
font-weight:700;
font-size:16px;
border:none;
margin-top:10px;
transition:.2s;
}

.add-cart:hover{
background:#e6b800;
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(255,208,0,.3);
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(40px);
background:#111;
color:#ffd000;
padding:12px 20px;
border-radius:8px;
font-size:14px;
opacity:0;
transition:all .35s ease;
border:1px solid #333;
z-index:999;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* CART PANEL - IDÉNTICO AL INDEX */
#cartPanel{
position:fixed;
right:-100%;
top:0;
width:380px;
max-width: 95%;
height:100%;
background:#111;
border-left:1px solid #222;
padding:3%;
transition:.4s;
z-index:300;
overflow-y:auto;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}
#cartPanel.open{right:0;}
.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:3%;
border-bottom: 1px solid #222;
padding-bottom: 2%;
}
.close-cart{font-size:22px;cursor:pointer;}
.cart-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:#1a1a1a;padding:8px;border-radius:8px;}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.cart-item-info{flex:1;display:flex;flex-direction:column;}
.cart-item-info span{font-size:14px;}
.cart-item-info .cart-price{font-size:12px;color:#ffd000;}
.cart-item-controls{display:flex;align-items:center;gap:5px;}
.cart-item-controls button{width:28px;height:28px;background:#222;color:white;border:none;font-size:14px;border-radius:6px;cursor:pointer;transition:.2s;}
.cart-item-controls button:hover{background:#ffd000;color:black;}
.cart-item-controls input{width:40px;text-align:center;background:#111;border:1px solid #333;color:white;border-radius:6px;padding:4px;font-size:14px;}
.cart-item-controls .remove{font-size:12px;padding:0 6px;}
.no-products{
text-align:center;
color:#aaa;
margin-top:10px;
font-size:13px;
padding:20px;
}

@media(max-width:768px){
header{padding:15px 20px;}
.container{padding:20px 5%;}
.back-btn, .cart{font-size:20px;}
.logo{font-size:16px;letter-spacing:4px;}
}
</style>
</head>

<body>

<header>
    <!-- ➤ NUEVA FLECHA BLANCA SVG -->
    <div class="back-btn" onclick="goHome()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12,19 5,12 12,5"></polyline>
        </svg>
    </div>
    
    <div class="logo">INNEGABLE</div>

    <div class="cart" onclick="toggleCart()">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.6 13.4a2 2 0 0 0 2 1.6h7.4a2 2 0 0 0 2-1.6L23 6H6"></path>
        </svg>

        <span id="cart-count" class="cart-count">0</span>

    </div>
</header>
<div id="overlay" onclick="closeCart()"></div>

<div class="container">

<div class="product-view">

<div class="product-left" id="productLeft">

<img id="pageImg" draggable="false">

<div class="arrow left" onclick="prevImg()">‹</div>
<div class="arrow right" onclick="nextImg()">›</div>

<div class="product-thumbs" id="pageThumbs"></div>

</div>

<div class="product-right">

<h2 id="pageTitle"></h2>
<p class="description" id="pageDesc"></p>
<p id="pagePrice"></p>

<h4>Talla:</h4>

<div class="size-options" id="sizeOptions">
<button onclick="selectSize(this)">S</button>
<button onclick="selectSize(this)">M</button>
<button onclick="selectSize(this)">L</button>
<button onclick="selectSize(this)">XL</button>
</div>

<h4>Cantidad:</h4>

<div class="qty-selector">
<button onclick="decreaseQty()">-</button>
<input type="text" id="pageQty" value="1" readonly>
<button onclick="increaseQty()">+</button>
</div>

<button class="add-cart" onclick="addProduct()">Agregar al carrito</button>

</div>
</div>
</div>

<div id="toast"></div>

<!-- CARRITO IDÉNTICO AL INDEX -->
<div id="cartPanel">
<div class="cart-header">
<h2>Carrito</h2>
<div class="close-cart" onclick="closeCart()">✕</div>
</div>
<div id="cartItems"></div>
<h3 id="total">Total: $0</h3>
</div>

<script>
/* GLOBAL CART - COMPARTIDO CON INDEX */
let cart = JSON.parse(localStorage.getItem("cart")) || []

/* PRODUCT DATA - MANTIENE TUS 3 FOTOS */
let currentProduct={
images:["batman1.png","batman2.jpg","batman3.jpg"],
name:"Playera Batman Oversize",
price:350,
desc:"Playera Batman edición limitada. 100% algodón premium."
};

/* SI VIENE DESDE INDEX, SOLO ACTUALIZA NOMBRE/PRECIO/DESC */
const params = new URLSearchParams(window.location.search)
if(params.get("name")){
currentProduct.name = params.get("name")
currentProduct.price = parseInt(params.get("price")) || currentProduct.price
currentProduct.desc = params.get("desc") || currentProduct.desc
}

let selectedSize=null;
let pageQty=1;
let currentImg=0;

function initProduct(){
document.getElementById("pageTitle").innerText=currentProduct.name;
document.getElementById("pagePrice").innerText="$"+currentProduct.price;
document.getElementById("pageDesc").innerText=currentProduct.desc;

showImg(currentImg);

const thumbs=document.getElementById("pageThumbs");

currentProduct.images.forEach((img,i)=>{
let im=document.createElement("img");
im.src=img;
if(i==0) im.classList.add("active");
im.onclick=()=>{
currentImg=i;
showImg(i);
}
thumbs.appendChild(im);
});
}

function showImg(i){
const img=document.getElementById("pageImg");
img.style.opacity="0";
setTimeout(()=>{
img.src=currentProduct.images[i];
img.style.opacity="1";
document.querySelectorAll("#pageThumbs img")
.forEach(t=>t.classList.remove("active"));
document.querySelectorAll("#pageThumbs img")[i].classList.add("active");
},200);
}

function prevImg(){
currentImg=(currentImg-1+currentProduct.images.length)%currentProduct.images.length;
showImg(currentImg);
}

function nextImg(){
currentImg=(currentImg+1)%currentProduct.images.length;
showImg(currentImg);
}

function selectSize(btn){
document.querySelectorAll(".size-options button")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSize=btn.innerText;
}

function increaseQty(){
pageQty++;
document.getElementById("pageQty").value=pageQty;
}

function decreaseQty(){
if(pageQty>1){
pageQty--;
document.getElementById("pageQty").value=pageQty;
}
}

function showToast(message){
const toast=document.getElementById("toast");
toast.innerText=message;
toast.classList.add("show");
setTimeout(()=>{
toast.classList.remove("show");
},2000);
}

/* CART FUNCTIONS - IDÉNTICAS AL INDEX */
function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
document.getElementById("overlay").classList.toggle("show")
renderCartItems()
}

function closeCart(){
document.getElementById("cartPanel").classList.remove("open")
document.getElementById("overlay").classList.remove("show")
}

function updateCartCount(){
let count = cart.reduce((a,b)=>a+(b.qty||1),0)
const c = document.getElementById("cart-count")
if(count>0){
c.style.display="block"
c.innerText=count
}else{
c.style.display="none"
}
}

function renderCartItems(){
const container=document.getElementById("cartItems")
container.innerHTML=""
if(cart.length===0){
container.innerHTML='<div class="no-products">Tu carrito está vacío.</div>'
document.getElementById("total").innerText="Total: $0"
return
}
let total=0
cart.forEach((p,i)=>{
let div=document.createElement("div") 
div.className="cart-item"
div.innerHTML=`
<img src="${p.img}">
<div class="cart-item-info">
<span>${p.name} ${p.size ? `(${p.size})` : ''}</span>
<span class="cart-price">$${p.price}</span>
</div>
<div class="cart-item-controls">
<button onclick="changeQty(${i},-1)">-</button>
<input type="text" value="${p.qty}" readonly>
<button onclick="changeQty(${i},1)">+</button>
<button class="remove" onclick="removeItem(${i})">✕</button>
</div>`
container.appendChild(div)
total += p.price * p.qty
})
document.getElementById("total").innerText="Total: $"+total
localStorage.setItem("cart",JSON.stringify(cart))
}

function changeQty(i,a){
cart[i].qty=Math.max(1,cart[i].qty+a)
renderCartItems()
updateCartCount()
}

function removeItem(i){
cart.splice(i,1)
renderCartItems()
updateCartCount()
}

/* ADD TO CART */
function addProduct(){
if(!selectedSize){
showToast("Por favor seleccione una talla")
const sizes=document.getElementById("sizeOptions")
sizes.classList.add("shake")
setTimeout(()=>{
sizes.classList.remove("shake")
},400)
return
}

const existing = cart.find(p=>p.name===currentProduct.name && p.size===selectedSize)
if(existing){
existing.qty += pageQty
}else{
cart.push({
name:currentProduct.name,
price:currentProduct.price,
img:currentProduct.images[0],
size:selectedSize,
qty:pageQty
})
}

localStorage.setItem("cart",JSON.stringify(cart))
updateCartCount()
showToast("Producto agregado al carrito ✓")
pageQty=1
document.getElementById("pageQty").value=pageQty
}

/* NAVIGATION */
function goHome(){
window.location.href="index.html"
}

/* INITIALIZE */
initProduct()
updateCartCount()
</script>

</body>
</html>
